<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/file.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f6ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="A visually stunning, high-performance Hacker News client built with Vite and the official HN API. Experience HN with a premium, focused interface and real-time updates."
    />
    <link rel="canonical" href="https://hackernews.coreyburns.ca/" />
    <meta property="og:title" content="HN Afterglow — A Modern Hacker News Experience" />
    <meta
      property="og:description"
      content="Experience Hacker News with a premium, focused interface and real-time updates."
    />
    <meta property="og:url" content="https://hackernews.coreyburns.ca" />
    <meta property="og:site_name" content="HN Afterglow" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HN Afterglow — A Modern Hacker News Experience" />
    <meta
      name="twitter:description"
      content="Experience Hacker News with a premium, focused interface and real-time updates."
    />
    <meta name="twitter:creator" content="@coreyburns" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HN Afterglow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>HN Afterglow — A Modern Hacker News Experience</title>
  </head>
  <body class="antialiased" style="font-family: Geist, system-ui, sans-serif">
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
